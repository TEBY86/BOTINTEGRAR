<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freework | Factibilidad Entel</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d12fd3; 
            --primary-gradient: linear-gradient(135deg, #b537f2 0%, #f02aa6 100%);
            --primary-glow: rgba(209, 47, 211, 0.2);
            --success: #00f298;
            --success-bg: rgba(0, 242, 152, 0.1);
            --warning: #ffb800;
            --warning-bg: rgba(255, 184, 0, 0.1);
            --error: #ff4b81;
            --error-bg: rgba(255, 75, 129, 0.1);
            --bg: #07050a; 
            --surface: #120f1d; 
            --surface-2: #1a1629;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(210, 47, 211, 0.3);
            --text: #ffffff;
            --text-2: #a19eb1;
            --text-3: #5f5b77;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(181, 55, 242, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -10%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(240, 42, 166, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .noise {
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 92%;
            max-width: 440px;
            padding: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px; 
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.8);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: 0.2px;
            color: var(--text);
        }
        .logo em {
            font-style: normal;
            color: var(--primary);
            font-weight: 800;
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.62rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.1rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            line-height: 1.15;
            margin-bottom: 12px;
            color: #fff;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-2);
            line-height: 1.6;
            margin-bottom: 24px;
            font-weight: 400;
        }

        /* Tabs Selector */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-2);
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--primary-gradient);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(209, 47, 211, 0.2);
        }

        .tab-btn:hover:not(.active) {
            border-color: var(--border-hover);
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .input-row {
            display: flex;
            flex-direction: column; 
            gap: 15px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap svg {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            pointer-events: none;
            transition: all 0.3s;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 20px 18px 52px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            transition: all 0.3s ease;
        }
        input[type="text"]::placeholder { color: var(--text-3); }
        input[type="text"]:focus {
            border-color: var(--primary);
            background: #1d1930;
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        button.main-btn {
            width: 100%;
            height: 56px;
            background: var(--primary-gradient);
            color: #fff;
            border: none;
            border-radius: 18px;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(181, 55, 242, 0.2);
        }
        button.main-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 15px 30px rgba(240, 42, 166, 0.3);
        }
        button.main-btn:disabled {
            background: var(--surface-2);
            color: var(--text-3);
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }

        button#clearBtn {
            width: 100%;
            height: 48px;
            background: transparent;
            color: var(--text-2);
            border: 1px solid var(--border);
            border-radius: 18px;
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: none; 
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            margin-top: 10px;
        }
        button#clearBtn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: var(--text-3);
        }
        button#clearBtn.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        /* Activity Panel */
        .log-section {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .log-section.active { display: block; }

        .log-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            width: 40%;
            background: var(--primary-gradient);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--primary-glow);
            animation: progressMove 1.8s infinite cubic-bezier(0.445, 0.05, 0.55, 0.95);
            position: absolute;
        }

        @keyframes progressMove {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        .status-feed {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            max-height: 160px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        
        .status-feed::-webkit-scrollbar { width: 4px; }
        .status-feed::-webkit-scrollbar-track { background: transparent; }
        .status-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .status-item {
            font-size: 0.88rem;
            line-height: 1.4;
            color: var(--text-2);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            animation: itemSlide 0.3s ease forwards;
        }

        .status-item i {
            margin-top: 4px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            flex-shrink: 0;
            box-shadow: 0 0 5px var(--primary-glow);
        }

        .status-item.ok { color: var(--success); }
        .status-item.ok i { background: var(--success); box-shadow: 0 0 5px var(--success); }
        .status-item.warn { color: var(--warning); }
        .status-item.warn i { background: var(--warning); box-shadow: 0 0 5px var(--warning); }
        .status-item.err { color: var(--error); }
        .status-item.err i { background: var(--error); box-shadow: 0 0 5px var(--error); }

        @keyframes itemSlide {
            from { opacity: 0; transform: translateX(-5px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Result */
        .result-section { margin-top: 25px; display: none; }
        .result-section.active { display: block; }

        .result-card {
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(5px);
        }
        .result-card.success { background: var(--success-bg); border-color: rgba(0, 242, 152, 0.15); }
        .result-card.warning { background: var(--warning-bg); border-color: rgba(255, 184, 0, 0.15); }
        .result-card.error   { background: var(--error-bg);   border-color: rgba(255, 75, 129, 0.15); }

        .result-title { 
            font-family: 'Syne', sans-serif; 
            font-size: 1.05rem; 
            font-weight: 700; 
            margin-bottom: 8px;
        }
        .result-body { font-size: 0.9rem; line-height: 1.5; color: var(--text-2); white-space: pre-line; }
        .result-img { margin-top: 15px; width: 100%; border-radius: 16px; border: 1px solid var(--border); display: none; }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--border);
            padding-top: 25px;
        }
        footer span { font-size: 0.68rem; color: var(--text-3); font-weight: 600; letter-spacing: 0.5px; }

        @media (max-width: 480px) {
            .container { padding: 35px 25px; }
            h1 { font-size: 1.7rem; }
        }
    </style>
</head>
<body>
<div class="noise"></div>

<div class="container">
    <header>
        <div class="logo">Free<em>work</em>Bot</div>
        <div class="badge">
            <span class="badge-dot"></span>
            Conectado
        </div>
    </header>

    <h1>Validación</h1>
    <p class="subtitle">Consulta factibilidad técnica o evaluación de RUT de forma automatizada.</p>

    <!-- Selector de modo -->
    <div class="tabs-container">
        <button id="tabDireccion" class="tab-btn active" onclick="cambiarModo('direccion')">
            📍 Dirección
        </button>
        <button id="tabRut" class="tab-btn" onclick="cambiarModo('rut')">
            🪪 RUT
        </button>
    </div>

    <!-- Panel Dirección -->
    <div id="panelDireccion" class="input-row">
        <div class="input-wrap">
            <input type="text" id="addressInput"
                placeholder="Calle, Número, Comuna"
                autocomplete="off" spellcheck="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>
            </svg>
        </div>
        <button id="searchBtn" class="main-btn" onclick="iniciarConsulta()">
            <span class="btn-text">Verificar Cobertura</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </div>

    <!-- Panel RUT -->
    <div id="panelRut" class="input-row" style="display: none;">
        <div class="input-wrap">
            <input type="text" id="rutInput"
                placeholder="12.345.678-9"
                autocomplete="off" spellcheck="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            </svg>
        </div>
        <button id="rutSearchBtn" class="main-btn" onclick="consultarRut()">
            <span class="btn-text-rut">Verificar RUT</span>
            <div class="spinner" id="rutSpinner"></div>
        </button>
    </div>

    <button id="clearBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Nueva Consulta
    </button>

    <!-- Panel de Actividad -->
    <div class="log-section" id="logSection">
        <div class="log-label">
            <span>Estado del proceso</span>
            <span id="statusPercent">Analizando...</span>
        </div>
        
        <div class="progress-container" id="loadingBar">
            <div class="progress-bar"></div>
        </div>

        <div class="status-feed" id="logStream"></div>
    </div>

    <!-- Resultados -->
    <div class="result-section" id="resultSection">
        <div class="result-card" id="resultCard">
            <div class="result-head">
                <span class="result-icon" id="resultIcon">✅</span>
                <span class="result-title" id="resultTitle">Resultado</span>
            </div>
            <div class="result-body" id="resultBody"></div>
            <img id="resultImg" class="result-img" alt="Evidencia">
        </div>
    </div>

    <footer>
        <span>FREEOPS © 2026</span>
        <span class="server-url" id="serverUrlDisplay" style="color: var(--primary); font-weight: 700;">ACTIVE ENGINE</span>
    </footer>
</div>

<script>
// --- CONFIGURACIÓN ---
const SERVER_BASE = 'https://botintegrar-production.up.railway.app';


async function verificarPermisoWeb(userId) {
    const res = await fetch(`${SERVER_BASE}/permisos/${userId}?accion=consultar`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
}


// 3. Obtener ID del usuario
function obtenerUserId() {
    let userId = localStorage.getItem('freework_user_id');
    if (!userId) {
        userId = prompt('🔐 Ingresa tu ID:');
        if (userId) localStorage.setItem('freework_user_id', userId);
    }
    return userId;
}






// --- ELEMENTOS DOM ---
const panelDireccion = document.getElementById('panelDireccion');
const panelRut       = document.getElementById('panelRut');
const tabDireccion   = document.getElementById('tabDireccion');
const tabRut         = document.getElementById('tabRut');

const addressInput   = document.getElementById('addressInput');
const rutInput       = document.getElementById('rutInput');

const searchBtn      = document.getElementById('searchBtn');
const rutSearchBtn   = document.getElementById('rutSearchBtn');

const spinner        = document.getElementById('spinner');
const rutSpinner     = document.getElementById('rutSpinner');

const logSection     = document.getElementById('logSection');
const logStream      = document.getElementById('logStream');
const loadingBar     = document.getElementById('loadingBar');
const clearBtn       = document.getElementById('clearBtn');

const resultSection  = document.getElementById('resultSection');
const resultCard     = document.getElementById('resultCard');
const resultIcon     = document.getElementById('resultIcon');
const resultTitle    = document.getElementById('resultTitle');
const resultBody     = document.getElementById('resultBody');
const resultImg      = document.getElementById('resultImg');

// --- LÓGICA DE INTERFAZ ---
function cambiarModo(modo) {
    if (modo === 'direccion') {
        panelDireccion.style.display = 'flex';
        panelRut.style.display = 'none';
        tabDireccion.classList.add('active');
        tabRut.classList.remove('active');
    } else {
        panelDireccion.style.display = 'none';
        panelRut.style.display = 'flex';
        tabDireccion.classList.remove('active');
        tabRut.classList.add('active');
    }
    limpiarPantalla();
}

function addLog(texto, tipo = 'info') {
    const item = document.createElement('div');
    const cleanText = texto.replace(/\[.*?\]:?\s?/, '').replace(/^[✅⚠️❌]\s?/, '');
    item.className = `status-item ${tipo}`;
    item.innerHTML = `<i></i><span>${cleanText}</span>`;
    logStream.appendChild(item);
    logStream.scrollTop = logStream.scrollHeight;
}

function limpiarPantalla() {
    addressInput.value = '';
    rutInput.value = '';
    logSection.classList.remove('active');
    resultSection.classList.remove('active');
    clearBtn.classList.remove('active');
    logStream.innerHTML = '';
    resultImg.style.display = 'none';
    resultImg.src = '';
}

clearBtn.addEventListener('click', limpiarPantalla);

// --- CONSULTA DIRECCIÓN (SSE) ---
function iniciarConsulta() {
    const direccion = addressInput.value.trim();
    if (!direccion) return addressInput.focus();
    
    // 🔐 VERIFICAR PERMISOS (AGREGADO)
    const userId = obtenerUserId();
    if (!userId) return;
    
 // 👇 NUEVO BLOQUE CON CUPOS VISIBLES:
    verificarPermisoWeb(userId).then(permiso => {
        if (!permiso.permitido) {
            logSection.classList.add('active');
            addLog(`Sin permiso: ${permiso.mensaje}`, 'err');
            
            if (permiso.estadisticas) {
                const s = permiso.estadisticas;
                renderResult('error', 'Sin acceso',
                    `Cupo diario: ${s.dia.usadas}/${s.dia.maximo} usadas\n` +
                    `Restantes hoy: ${s.dia.restantes}\n` +
                    `Restantes esta semana: ${s.semana.restantes}`
                );
            }
            return;
        }
        
        if (permiso.estadisticas) {
            const s = permiso.estadisticas;
            const usado = Number(s.dia.usadas) || 0;
            const maximo = Math.max(1, Number(s.dia.maximo) || 0);
            const pct = Math.min(100, Math.round((usado / maximo) * 100));
            logSection.classList.add('active');
            addLog(`Cupo hoy: ${s.dia.restantes} restantes (${usado}/${maximo} · ${pct}%)`, 'ok');
        }
        
        continuarConsulta(direccion, userId);
    }).catch(err => {
        logSection.classList.add('active');
        addLog(`Error al verificar permisos: ${err.message}`, 'err');
    });
}

    
   

// Función nueva para el resto de la consulta
function continuarConsulta(direccion, userId) {
    // UI Loading
    searchBtn.disabled = true;
    spinner.style.display = 'block';
    document.querySelector('.btn-text').style.display = 'none';
    logStream.innerHTML = '';
    logSection.classList.add('active');
    loadingBar.style.display = 'block';
    resultSection.classList.remove('active');
    clearBtn.classList.remove('active');
    
    addLog(`Iniciando búsqueda para: ${direccion}`);
    
    const url = `${SERVER_BASE}/verificar?direccion=${encodeURIComponent(direccion)}&userId=${userId}`;
    
    fetch(`${SERVER_BASE}/health`, { signal: AbortSignal.timeout(3000) })
        .then(() => {
            const evtSource = new EventSource(url);
            let mensajesAcumulados = [];

            evtSource.onmessage = (e) => {
                const payload = JSON.parse(e.data);
                
                if (payload.tipo === 'mensaje') {
                    mensajesAcumulados.push(payload.texto);
                    let tipo = 'info';
                    if (payload.texto.includes('✅')) tipo = 'ok';
                    if (payload.texto.includes('⚠️')) tipo = 'warn';
                    if (payload.texto.includes('❌')) tipo = 'err';
                    addLog(payload.texto, tipo);
                }

                if (payload.tipo === 'foto' && payload.base64) {
                    renderResult('success', 'Factibilidad Confirmada', 'Se ha capturado la evidencia de cobertura.', payload.base64);
                }

                if (payload.tipo === 'fin') {
                    const finalMsg = mensajesAcumulados.join('\n');
                    const tipoFinal = finalMsg.includes('✅') ? 'success' : (finalMsg.includes('⚠️') ? 'warning' : 'error');
                    renderResult(tipoFinal, null, finalMsg);
                    evtSource.close();
                    finalizarLoading();
                }

                if (payload.tipo === 'error') {
                    addLog(payload.texto, 'err');
                    renderResult('error', 'Error del Sistema', payload.texto);
                    evtSource.close();
                    finalizarLoading();
                }
            };

            evtSource.onerror = () => {
                evtSource.close();
                finalizarLoading();
            };
        })
        .catch(() => {
            addLog('No se pudo establecer conexión con el bot local.', 'err');
            renderResult('error', 'Error de Conexión', 'Asegúrate de que api-server.js esté activo.');
            finalizarLoading();
        });
}

  

function finalizarLoading() {
    searchBtn.disabled = false;
    spinner.style.display = 'none';
    document.querySelector('.btn-text').style.display = 'inline';
    loadingBar.style.display = 'none';
    clearBtn.classList.add('active');
}

// --- CONSULTA RUT (POST) ---
// --- CONSULTA RUT (POST) ---
function consultarRut() {
    const rut = rutInput.value.trim();
    if (!rut) return rutInput.focus();
    
    // 🔐 VERIFICAR PERMISOS
    const userId = obtenerUserId();
    if (!userId) return;


    
    
    // UI Loading
    rutSearchBtn.disabled = true;
    rutSpinner.style.display = 'block';
    document.querySelector('.btn-text-rut').style.display = 'none';
    
    logStream.innerHTML = '';
    logSection.classList.add('active');
    loadingBar.style.display = 'block';
    resultSection.classList.remove('active');
    clearBtn.classList.remove('active');
    
    addLog(`🔐 Verificando permisos...`);
    
    // Verificar permisos ANTES de consultar
    verificarPermisoWeb(userId).then(permiso => {
        if (!permiso.permitido) {
            logSection.classList.add('active');
            addLog(`Sin permiso: ${permiso.mensaje}`, 'err');
            
            if (permiso.estadisticas) {
                const s = permiso.estadisticas;
                renderResult('error', 'Sin acceso',
                    `Cupo diario: ${s.dia.usadas}/${s.dia.maximo} usadas\n` +
                    `Restantes hoy: ${s.dia.restantes}\n` +
                    `Restantes esta semana: ${s.semana.restantes}`
                );
            }
            finalizarLoadingRut();
            return;
        }
        
        if (permiso.estadisticas) {
            const s = permiso.estadisticas;
            const usado = Number(s.dia.usadas) || 0;
            const maximo = Math.max(1, Number(s.dia.maximo) || 0);
            const pct = Math.min(100, Math.round((usado / maximo) * 100));
            addLog(`Cupo hoy: ${s.dia.restantes} restantes (${usado}/${maximo} · ${pct}%)`, 'ok');
        }
        
        addLog(`🪪 Evaluando RUT: ${rut}...`);
        
        // Continuar con la consulta
        fetch(`${SERVER_BASE}/rut`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rut: rut, userId: userId })
        })
        .then(response => response.json())
        .then(data => {
            console.log("📦 RESPUESTA COMPLETA:", data);
            console.log("🖼️ screenshot existe?:", !!data.screenshot);
            console.log("🖼️ screenshot_recortado existe?:", !!data.screenshot_recortado);

            if (data.ocr) {
                addLog("OCR: " + (data.ocr.tieneAprobado ? "APROBADO" : "NO DETECTADO"), "info");
                if (data.ocr.cupoDetectado) addLog("OCR Cupo: " + data.ocr.cupoDetectado, "ok");
            }

            let screenshot = data.screenshot_recortado || data.screenshot || null;
            if (screenshot && screenshot.startsWith("data:image")) {
                screenshot = screenshot.split(",")[1];
            }

            if (screenshot) {
                console.log("🖼️ screenshot largo:", screenshot.length);
            }

            if (data.ok) {
                const mensaje = data.mensaje || 'Evaluación completada';
                const esAprobado = data.resultado === 'aprobado' || mensaje.includes('✅');
                addLog(mensaje, esAprobado ? 'ok' : 'warn');
                renderResult(
                    esAprobado ? 'success' : 'warning',
                    esAprobado ? 'RUT Aprobado' : 'RUT con Observaciones',
                    mensaje,
                    screenshot
                );
            } else {
                addLog(data.error || 'Error al evaluar RUT', 'err');
                renderResult('error', 'Error', data.error || 'No se pudo evaluar el RUT');
            }
            finalizarLoadingRut();
        })
        .catch(err => {
            console.error("Error:", err);
            addLog('Error de conexión con el servidor', 'err');
            renderResult('error', 'Error de Conexión', 'El servidor local no respondió a la solicitud de RUT.');
            finalizarLoadingRut();
        });
    }).catch(err => {
        addLog(`❌ Error al verificar permisos: ${err.message}`, 'err');
        finalizarLoadingRut();
    });
}

function finalizarLoadingRut() {
    rutSearchBtn.disabled = false;
    rutSpinner.style.display = 'none';
    document.querySelector('.btn-text-rut').style.display = 'inline';
    loadingBar.style.display = 'none';
    clearBtn.classList.add('active');
}

function renderResult(tipo, titulo, mensaje, screenshotBase64 = null) {
    const iconos = { success: '✅', warning: '⚠️', error: '❌' };
    resultCard.className = `result-card ${tipo}`;
    resultIcon.textContent = iconos[tipo] || '❔';
    resultTitle.textContent = titulo || (tipo === 'success' ? 'Disponible' : tipo === 'warning' ? 'Observación' : 'No Disponible');
    resultBody.textContent = mensaje;
    if (screenshotBase64) {
        resultImg.src = `data:image/png;base64,${screenshotBase64}`;
        resultImg.style.display = 'block';
    } else {
        resultImg.style.display = 'none';
    }
    resultSection.classList.add('active');
}
